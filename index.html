<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Inventory Scanner</title>

<link rel="stylesheet"
href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="card">

<h2>Inventory Scanner</h2>

<div id="login">

<input
id="userName"
type="text"
placeholder="Masukkan Nama">

<br><br>

<button onclick="alert('Tombol Berfungsi')">
Lanjut
</button>

</div>

<div id="menu"
style="display:none">

<button onclick="pilih('IN')">
📥 Barang Masuk
</button>

<button onclick="pilih('OUT')">
📤 Barang Keluar
</button>

</div>

<div id="scanner"
style="display:none">

<h3 id="judulScan"></h3>

<div id="reader"></div>

</div>

<div id="form"
style="display:none">

<h3 id="nama"></h3>

<p id="kategori"></p>

<p id="stok"></p>

<input
id="qty"
type="number"
placeholder="Qty">

<br><br>

<textarea
id="keterangan"
placeholder="Keterangan"></textarea>

<br><br>

<button onclick="simpan()">
💾 Simpan
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
